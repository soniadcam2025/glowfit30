name: glowfit
description: GlowFit - Fitness & Wellness Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Core UI & Fonts
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  get: ^4.6.6

  # Networking
  dio: ^5.3.1

  # Local Storage
  get_storage: ^2.1.1
  flutter_secure_storage: ^9.0.0

  # SVG Support
  flutter_svg: ^2.0.10+1

  # Utilities
  intl: ^0.19.0

  # Charts & Visualization
  fl_chart: ^0.64.0
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/illustrations/
